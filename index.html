<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Filibusterismo - Character Wheel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0C0A0E;
            --bg2: #161220;
            --fg: #F2E4C8;
            --muted: #8A7B66;
            --accent: #C9A84C;
            --accent-dim: rgba(201,168,76,0.15);
            --card: #1A1524;
            --border: #2A2236;
            --red: #9B2335;
            --teal: #1A5C5C;
            --bronze: #7A5C2E;
            --navy: #2D4A6B;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Source Sans 3',sans-serif;
            background:var(--bg);
            color:var(--fg);
            min-height:100vh;
            overflow-x:hidden;
        }
        .font-display { font-family:'Playfair Display',serif; }

        .bg-grad {
            position:fixed; inset:0; z-index:0; pointer-events:none;
            background:
                radial-gradient(ellipse at 15% 40%, rgba(155,35,53,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(201,168,76,0.06) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 85%, rgba(26,92,92,0.05) 0%, transparent 50%);
        }
        #particleCvs {
            position:fixed; inset:0; z-index:1; pointer-events:none;
        }

        .pointer-wrap {
            position:absolute; top:-12px; left:50%; transform:translateX(-50%); z-index:15;
            display:flex; flex-direction:column; align-items:center;
        }
        .pointer-dot {
            width:16px; height:16px; background:var(--accent); border-radius:50%;
            box-shadow:0 0 12px rgba(201,168,76,0.6);
        }
        .pointer-tri {
            width:0; height:0;
            border-left:14px solid transparent; border-right:14px solid transparent;
            border-top:30px solid var(--accent);
            margin-top:-2px;
            filter:drop-shadow(0 4px 8px rgba(201,168,76,0.4));
        }

        .wheel-glow {
            position:absolute; inset:-30px; border-radius:50%;
            background:radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 65%);
            opacity:0; transition:opacity .5s; pointer-events:none;
        }
        .wheel-glow.on { opacity:1; }

        .wheel-ring {
            position:absolute; inset:-10px; border-radius:50%;
            border:2.5px solid rgba(201,168,76,0.3); pointer-events:none;
        }

        .cat-btn {
            padding:.7rem 2rem; border:2px solid var(--border);
            background:transparent; color:var(--muted);
            font-family:'Playfair Display',serif; font-weight:700; font-size:1.05rem;
            cursor:pointer; transition:all .3s;
        }
        .cat-btn:first-child { border-radius:50px 0 0 50px; }
        .cat-btn:last-child { border-radius:0 50px 50px 0; }
        .cat-btn.active { background:var(--accent); color:#0C0A0E; border-color:var(--accent); }
        .cat-btn:not(.active):hover { border-color:var(--accent); color:var(--accent); }

        .spin-btn {
            background:linear-gradient(135deg,#C9A84C,#9E7E2A);
            color:#0C0A0E; font-family:'Playfair Display',serif;
            font-weight:900; font-size:1.4rem; letter-spacing:.06em;
            padding:.9rem 3.2rem; border:none; border-radius:60px;
            cursor:pointer; transition:all .3s;
            box-shadow:0 4px 28px rgba(201,168,76,0.3);
        }
        .spin-btn:hover:not(:disabled) {
            transform:translateY(-2px) scale(1.03);
            box-shadow:0 8px 36px rgba(201,168,76,0.5);
        }
        .spin-btn:active:not(:disabled) { transform:translateY(0) scale(.97); }
        .spin-btn:disabled { opacity:.45; cursor:not-allowed; }

        .result-overlay {
            position:fixed; inset:0; z-index:100;
            background:rgba(12,10,14,0.88); backdrop-filter:blur(10px);
            display:flex; align-items:center; justify-content:center;
            opacity:0; pointer-events:none; transition:opacity .4s;
        }
        .result-overlay.show { opacity:1; pointer-events:all; }
        .result-card {
            background:linear-gradient(150deg,#1E1928,#262036);
            border:1px solid var(--accent); border-radius:24px;
            padding:2.8rem 2.5rem; max-width:480px; width:92%;
            text-align:center;
            transform:scale(.78) translateY(30px);
            transition:transform .45s cubic-bezier(.34,1.56,.64,1);
            box-shadow:0 24px 80px rgba(201,168,76,0.12), inset 0 1px 0 rgba(201,168,76,0.1);
        }
        .result-overlay.show .result-card { transform:scale(1) translateY(0); }

        .close-btn {
            background:none; border:2px solid var(--muted); color:var(--muted);
            width:40px; height:40px; border-radius:50%; cursor:pointer;
            font-size:1.1rem; transition:all .3s;
            display:inline-flex; align-items:center; justify-content:center;
        }
        .close-btn:hover { border-color:var(--accent); color:var(--accent); }

        .hist-item {
            background:var(--card); border:1px solid var(--border); border-radius:10px;
            padding:.6rem 1rem; display:flex; align-items:center; gap:.7rem;
            animation:slideIn .35s ease;
        }
        @keyframes slideIn { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }

        .badge {
            display:inline-block; padding:.2rem .7rem; border-radius:20px;
            font-size:.75rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
        }
        .badge-f { background:rgba(155,35,53,0.2); color:#E8637A; border:1px solid rgba(155,35,53,0.3); }
        .badge-m { background:rgba(26,92,92,0.2); color:#4ECDC4; border:1px solid rgba(26,92,92,0.3); }
        .badge-noli { background:rgba(201,168,76,0.15); color:#C9A84C; border:1px solid rgba(201,168,76,0.3); }

        .sep {
            display:flex; align-items:center; gap:1rem; justify-content:center;
            color:var(--muted); font-size:.75rem;
        }
        .sep::before,.sep::after {
            content:''; height:1px; width:60px;
            background:linear-gradient(to right, transparent, var(--border), transparent);
        }

        #confettiCvs {
            position:fixed; inset:0; z-index:99; pointer-events:none;
        }

        .noli-tag {
            display:inline-block; font-size:.6rem; padding:.1rem .4rem;
            border-radius:8px; background:rgba(201,168,76,0.2);
            color:var(--accent); font-weight:700; margin-left:.3rem;
            vertical-align:middle; letter-spacing:.03em;
        }

        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        @media(max-width:640px){
            .spin-btn { font-size:1.15rem; padding:.75rem 2rem; }
            .result-card { padding:2rem 1.5rem; }
            .cat-btn { padding:.6rem 1.3rem; font-size:.95rem; }
        }

        @media(prefers-reduced-motion:reduce){
            *, *::before, *::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
        }
    </style>
</head>
<body>

<div class="bg-grad"></div>
<canvas id="particleCvs"></canvas>
<canvas id="confettiCvs"></canvas>

<main class="relative z-10 flex flex-col items-center min-h-screen px-4 py-8">

    <header class="text-center mb-6">
        <p class="text-sm tracking-[.3em] uppercase mb-2" style="color:var(--muted);">
            <i class="fa-solid fa-book-open mr-2"></i>Jose Rizal's Novels
        </p>
        <h1 class="font-display font-black text-4xl sm:text-5xl md:text-6xl leading-tight" style="color:var(--fg);">
            El Filibusterismo
        </h1>
        <p class="font-display text-lg sm:text-xl mt-2" style="color:var(--accent);">Spin the Character Wheel</p>
        <div class="sep mt-4">
            <i class="fa-solid fa-diamond" style="font-size:.5rem;"></i>
        </div>
        <p class="text-xs mt-2" style="color:var(--muted);">
            <span class="noli-tag">NOLI</span> marks characters originally from Noli Me Tangere
        </p>
    </header>

    <section class="flex mb-8" role="tablist" aria-label="Character category">
        <button class="cat-btn active" role="tab" aria-selected="true" data-cat="female" onclick="switchCategory('female')">
            <i class="fa-solid fa-venus mr-1"></i> Girls
        </button>
        <button class="cat-btn" role="tab" aria-selected="false" data-cat="male" onclick="switchCategory('male')">
            <i class="fa-solid fa-mars mr-1"></i> Boys
        </button>
    </section>

    <section class="relative mb-8" style="width:min(440px,90vw); height:min(440px,90vw);">
        <div class="pointer-wrap">
            <div class="pointer-dot"></div>
            <div class="pointer-tri"></div>
        </div>
        <div class="wheel-glow" id="wheelGlow"></div>
        <div class="wheel-ring"></div>
        <canvas id="wheelCanvas" style="width:100%;height:100%;display:block;"></canvas>
    </section>

    <section class="mb-10">
        <button class="spin-btn" id="spinBtn" onclick="startSpin()" aria-label="Spin the wheel">
            <i class="fa-solid fa-rotate mr-2"></i>SPIN
        </button>
    </section>

    <section class="w-full max-w-md" id="historySection" style="display:none;">
        <h3 class="font-display font-bold text-lg mb-3 flex items-center gap-2" style="color:var(--muted);">
            <i class="fa-solid fa-clock-rotate-left"></i> Recent Picks
        </h3>
        <div id="historyList" class="flex flex-col gap-2 max-h-60 overflow-y-auto pr-1"></div>
    </section>

</main>

<div class="result-overlay" id="resultOverlay" role="dialog" aria-modal="true" aria-label="Spin result">
    <div class="result-card">
        <div class="flex justify-end mb-2">
            <button class="close-btn" onclick="closeResult()" aria-label="Close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div id="resultBadge" class="badge mb-4"></div>
        <h2 id="resultName" class="font-display font-black text-3xl sm:text-4xl mb-1" style="color:var(--fg);"></h2>
        <div id="resultNoliTag" class="mb-4" style="min-height:20px;"></div>
        <p id="resultDesc" class="text-base leading-relaxed mb-6" style="color:var(--muted);"></p>
        <button onclick="closeResult()" class="spin-btn" style="font-size:1rem;padding:.65rem 2.2rem;">
            <i class="fa-solid fa-arrow-rotate-right mr-2"></i>Spin Again
        </button>
    </div>
</div>

<script>
/* ───── Character Data ───── */
const characters = {
    female: [
        { name:"Paulita Gomez", noli:false, desc:"A beautiful and flirtatious young woman. Originally Isagani's girlfriend, she ultimately leaves him for the wealthier Juanito Pelaez, representing superficiality and materialism in colonial society." },
        { name:"Juli", noli:false, desc:"Daughter of Kabesang Tales and Basilio's beloved. A symbol of tragic Filipino womanhood — her suffering and ultimate fate reflect the oppression of the poor under the friar-dominated system." },
        { name:"Donya Victorina", noli:false, desc:"A Filipino woman obsessively mimicking Spanish culture. She wears elaborate European outfits, speaks broken Spanish, and looks down on her own people — the caricature of colonial mentality." },
        { name:"Dona Consolacion", noli:false, desc:"The abusive wife of the alferez. She is cruel, especially to those weaker than her, symbolizing how the oppressed can become oppressors when given a sliver of power." },
        { name:"Pepay", noli:false, desc:"A dancer who performs at the social gatherings of the elite. Her presence highlights the decadent lifestyle of the colonial upper class and the friars who frequent such entertainment." },
        { name:"Chichay", noli:false, desc:"A young servant girl who appears in the household scenes of the novel. She represents the many unnamed and unseen Filipinos who served the colonial elite in silence and obscurity." },
        { name:"Maria Clara", noli:true, desc:"The tragic heroine of Noli Me Tangere, referenced in El Filibusterismo as having died in the convent. Her fate haunts the novel as a symbol of the innocent lives destroyed by the friars and the colonial system." },
        { name:"Sisa", noli:true, desc:"The loving mother of Basilio and Crispin from Noli Me Tangere, whose descent into madness and death is recalled by Basilio. She represents the suffering of Filipino mothers ground down by oppression." },
        { name:"Sinang", noli:true, desc:"Basilio's childhood friend from San Diego, briefly mentioned when he recalls his past. In Noli Me Tangere, she was a cheerful and practical girl — a contrast to the tragedy that surrounded her." },
        { name:"Dona Pia Alba", noli:true, desc:"Maria Clara's biological mother from Noli Me Tangere, referenced in passing. She died giving birth to Maria Clara, symbolizing the silent suffering of Filipino women erased by history." },
        { name:"Dona Rufina", noli:true, desc:"Mother of Sisa from Noli Me Tangere, mentioned in Basilio's memories of his family. She represents the generational cycle of poverty and suffering that colonialism imposed on Filipino families." },
        { name:"Sister Pute", noli:true, desc:"The cruel nun from the convent in Noli Me Tangere, referenced when Maria Clara's fate is recalled. She embodies the institutional cruelty hidden behind the veil of religious piety." }
    ],
    male: [
        { name:"Simoun", noli:false, desc:"The mysterious and wealthy jeweler — actually Crisostomo Ibarra in disguise. He returns to the Philippines to incite a violent revolution, driven by vengeance and a desire to overthrow Spanish rule." },
        { name:"Basilio", noli:false, desc:"Sisa's surviving son, now a medical student. Torn between his duty to help the sick and his involvement in Simoun's revolutionary plot, he represents the conflicted Filipino youth." },
        { name:"Isagani", noli:false, desc:"An idealistic young poet and student, deeply in love with Paulita Gomez. He represents the hopeful, intellectual youth of the Philippines who believe in reform over revolution." },
        { name:"Juanito Pelaez", noli:false, desc:"A wealthy, superficial, and boastful student who cares only about social status. He ultimately marries Paulita, representing the shallow elite who benefit from the colonial system." },
        { name:"Makaraig", noli:false, desc:"A wealthy and influential student leader. He organizes the petition to establish a Spanish academy for Filipino students, showing the power of organized student action." },
        { name:"Sandoval", noli:false, desc:"A Spanish student who surprisingly supports the Filipino students' movement. He proves that not all Spaniards were oppressors — some stood with the natives in solidarity." },
        { name:"Pecson", noli:false, desc:"A cynical and sarcastic student who provides sharp comic relief. His biting observations cut through the hypocrisy of colonial society with brutal honesty and dark humor." },
        { name:"Tadeo", noli:false, desc:"A student who would rather chase pleasure and attend fiestas than study. He represents those who waste their opportunities under a system that limits them anyway." },
        { name:"Placido Penitente", noli:false, desc:"A brilliant but deeply frustrated student, trapped between obedience to his domineering mother and his burning desire for intellectual freedom and self-determination." },
        { name:"Don Custodio", noli:false, desc:"A high-ranking government official famous for never making decisions. He symbolizes the bureaucratic paralysis and indecisiveness of the Spanish colonial government." },
        { name:"Padre Salvi", noli:false, desc:"The scheming Franciscan friar from Noli Me Tangere, now even more powerful in the church hierarchy. He continues to manipulate events from the shadows with cunning precision." },
        { name:"Padre Camorra", noli:false, desc:"A lecherous friar who uses his position to prey on young women. He represents the worst of clerical abuse and moral corruption that the novel denounces." },
        { name:"Padre Irene", noli:false, desc:"A seemingly kind and jovial friar who actually manipulates events behind the scenes. He shows how appearances can be deeply deceptive within the church." },
        { name:"Padre Florentino", noli:false, desc:"Isagani's uncle, a retired and principled priest. He represents the ideal of what clergy should be — wise, compassionate, and truly devoted to his people's welfare." },
        { name:"Quiroga", noli:false, desc:"A Chinese merchant who dreams of becoming a consul and gaining social prominence. He represents the foreign merchant class that profited under colonial rule." },
        { name:"Don Tiburcio", noli:false, desc:"Donya Victorina's hapless husband, a fake Spanish doctor who endures constant humiliation. He is a pitiable figure, a victim of his wife's delusions of grandeur." },
        { name:"Kabesang Tales", noli:false, desc:"Father of Juli, a hardworking farmer whose land was unjustly seized by the friars. His transformation into the bandit Matanglawin shows how injustice can turn a good man into a rebel." },
        { name:"Ben Zayb", noli:false, desc:"A journalist and writer who fancies himself a great intellectual. His shallow commentary represents the compromised press under colonial rule — all noise, no substance." },
        { name:"Elias", noli:true, desc:"The mysterious revolutionary from Noli Me Tangere, referenced by Basilio as the man who saved his life. Though absent, his spirit of sacrifice lives on as an inspiration for the revolution Simoun seeks." },
        { name:"Padre Damaso", noli:true, desc:"The antagonist friar from Noli Me Tangere, referenced as Maria Clara's true father. Though he does not appear directly, his past sins set in motion the tragedies that echo throughout El Filibusterismo." },
        { name:"Crispin", noli:true, desc:"Sisa's younger son from Noli Me Tangere, mentioned in Basilio's painful memories. His unjust death at the hands of the church symbolizes the murder of innocent Filipino children by the friars." },
        { name:"Don Rafael Ibarra", noli:true, desc:"Father of Crisostomo Ibarra from Noli Me Tangere, referenced as Simoun's father. His unjust death for defending a Filipino worker shows how the system crushed even the wealthy who defied it." }
    ]
};

/* ───── State ───── */
let currentCat = 'female';
let currentChars = characters.female;
let rotation = 0;
let velocity = 0;
let spinning = false;
let lastSegment = -1;
let history = [];
let audioCtx = null;

/* ───── Segment Colors ───── */
const segPalette = ['#9B2335','#1A5C5C','#7A5C2E','#2D4A6B'];
function segColor(i) { return segPalette[i % segPalette.length]; }

/* ───── Canvas Setup ───── */
const wheelCanvas = document.getElementById('wheelCanvas');
const wCtx = wheelCanvas.getContext('2d');
const dpr = Math.max(window.devicePixelRatio || 1, 1);
let W = 480;

function sizeWheel() {
    const container = wheelCanvas.parentElement;
    const cssW = container.clientWidth;
    W = Math.round(cssW * dpr);
    wheelCanvas.width = W;
    wheelCanvas.height = W;
    drawWheel();
}
sizeWheel();
window.addEventListener('resize', sizeWheel);

/* ───── Draw Wheel ───── */
function drawWheel() {
    const cx = W / 2, cy = W / 2;
    const outerR = cx - 16 * dpr;
    const innerR = 32 * dpr;
    const n = currentChars.length;
    const seg = (2 * Math.PI) / n;

    wCtx.clearRect(0, 0, W, W);

    // Outer shadow ring
    wCtx.save();
    wCtx.beginPath();
    wCtx.arc(cx, cy, outerR + 6 * dpr, 0, Math.PI * 2);
    wCtx.strokeStyle = 'rgba(201,168,76,0.12)';
    wCtx.lineWidth = 8 * dpr;
    wCtx.stroke();
    wCtx.restore();

    // Segments
    for (let i = 0; i < n; i++) {
        const a0 = i * seg + rotation;
        const a1 = (i + 1) * seg + rotation;

        wCtx.beginPath();
        wCtx.moveTo(cx, cy);
        wCtx.arc(cx, cy, outerR, a0, a1);
        wCtx.closePath();
        wCtx.fillStyle = segColor(i);
        wCtx.fill();

        const grad = wCtx.createRadialGradient(cx, cy, innerR, cx, cy, outerR);
        grad.addColorStop(0, 'rgba(0,0,0,0.25)');
        grad.addColorStop(0.5, 'rgba(0,0,0,0.05)');
        grad.addColorStop(1, 'rgba(255,255,255,0.06)');
        wCtx.fillStyle = grad;
        wCtx.fill();

        wCtx.strokeStyle = 'rgba(0,0,0,0.35)';
        wCtx.lineWidth = 1.5 * dpr;
        wCtx.stroke();

        // Noli indicator dot
        if (currentChars[i].noli) {
            const dotAngle = a0 + seg / 2;
            const dotDist = outerR * 0.88;
            const dx = cx + Math.cos(dotAngle) * dotDist;
            const dy = cy + Math.sin(dotAngle) * dotDist;
            wCtx.beginPath();
            wCtx.arc(dx, dy, Math.max(1, 3.5 * dpr), 0, Math.PI * 2);
            wCtx.fillStyle = '#C9A84C';
            wCtx.fill();
        }

        // Text
        wCtx.save();
        wCtx.translate(cx, cy);
        wCtx.rotate(a0 + seg / 2);
        let fontSize;
        if (n <= 8) fontSize = 15 * dpr;
        else if (n <= 12) fontSize = 13 * dpr;
        else if (n <= 16) fontSize = 12 * dpr;
        else if (n <= 20) fontSize = 10.5 * dpr;
        else fontSize = 9.5 * dpr;
        wCtx.font = `700 ${fontSize}px "Source Sans 3",sans-serif`;
        wCtx.textAlign = 'right';
        wCtx.textBaseline = 'middle';
        wCtx.fillStyle = '#F2E4C8';
        wCtx.shadowColor = 'rgba(0,0,0,0.6)';
        wCtx.shadowBlur = 4 * dpr;
        wCtx.fillText(currentChars[i].name, outerR - 18 * dpr, 0);
        wCtx.shadowBlur = 0;
        wCtx.restore();
    }

    // Pegs
    for (let i = 0; i < n; i++) {
        const a = i * seg + rotation;
        const px = cx + Math.cos(a) * (outerR + 1 * dpr);
        const py = cy + Math.sin(a) * (outerR + 1 * dpr);
        wCtx.beginPath();
        wCtx.arc(px, py, Math.max(1, 4 * dpr), 0, Math.PI * 2);
        wCtx.fillStyle = '#C9A84C';
        wCtx.fill();
        wCtx.strokeStyle = '#8B6914';
        wCtx.lineWidth = 1 * dpr;
        wCtx.stroke();
    }

    // Center circle
    const cGrad = wCtx.createRadialGradient(cx - 5*dpr, cy - 5*dpr, 0, cx, cy, innerR);
    cGrad.addColorStop(0, '#2A2336');
    cGrad.addColorStop(1, '#141020');
    wCtx.beginPath();
    wCtx.arc(cx, cy, innerR, 0, Math.PI * 2);
    wCtx.fillStyle = cGrad;
    wCtx.fill();
    wCtx.strokeStyle = '#C9A84C';
    wCtx.lineWidth = 3 * dpr;
    wCtx.stroke();

    wCtx.fillStyle = '#C9A84C';
    wCtx.font = `900 ${13 * dpr}px "Playfair Display",serif`;
    wCtx.textAlign = 'center';
    wCtx.textBaseline = 'middle';
    wCtx.fillText('SPIN', cx, cy);
}

/* ───── Determine Winner ───── */
function getWinnerIndex() {
    const n = currentChars.length;
    const seg = (2 * Math.PI) / n;
    const norm = ((rotation % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    const pointerAngle = (2 * Math.PI - norm + Math.PI * 1.5) % (2 * Math.PI);
    return Math.floor(pointerAngle / seg) % n;
}

/* ───── Audio ───── */
function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTick() {
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 600 + Math.random() * 500;
        osc.type = 'triangle';
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.04);
    } catch(e) {}
}

function playWin() {
    if (!audioCtx) return;
    try {
        [523, 659, 784, 1047].forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = f;
            osc.type = 'sine';
            const t = audioCtx.currentTime + i * 0.12;
            gain.gain.setValueAtTime(0.06, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
            osc.start(t); osc.stop(t + 0.35);
        });
    } catch(e) {}
}

/* ───── Spin Logic ───── */
function startSpin() {
    if (spinning) return;
    ensureAudio();
    spinning = true;
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('wheelGlow').classList.add('on');
    velocity = 0.25 + Math.random() * 0.2;
    lastSegment = getWinnerIndex();
    requestAnimationFrame(spinFrame);
}

function spinFrame() {
    rotation += velocity;
    velocity *= 0.988;

    const curSeg = getWinnerIndex();
    if (curSeg !== lastSegment) {
        playTick();
        lastSegment = curSeg;
    }

    drawWheel();

    if (velocity > 0.0008) {
        requestAnimationFrame(spinFrame);
    } else {
        spinning = false;
        document.getElementById('spinBtn').disabled = false;
        document.getElementById('wheelGlow').classList.remove('on');
        velocity = 0;
        const winner = currentChars[getWinnerIndex()];
        playWin();
        showResult(winner);
        addHistory(winner);
    }
}

/* ───── Category Switch ───── */
function switchCategory(cat) {
    if (spinning) return;
    currentCat = cat;
    currentChars = characters[cat];
    rotation = 0;
    document.querySelectorAll('.cat-btn').forEach(b => {
        const active = b.dataset.cat === cat;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active);
    });
    drawWheel();
}

/* ───── Result Display ───── */
function showResult(char) {
    const overlay = document.getElementById('resultOverlay');
    document.getElementById('resultName').textContent = char.name;
    document.getElementById('resultDesc').textContent = char.desc;
    const badge = document.getElementById('resultBadge');
    if (currentCat === 'female') {
        badge.className = 'badge badge-f';
        badge.textContent = 'Female Character';
    } else {
        badge.className = 'badge badge-m';
        badge.textContent = 'Male Character';
    }
    const noliTag = document.getElementById('resultNoliTag');
    if (char.noli) {
        noliTag.innerHTML = '<span class="noli-tag" style="font-size:.7rem;padding:.2rem .6rem;">FROM NOLI ME TANGERE</span>';
    } else {
        noliTag.innerHTML = '';
    }
    overlay.classList.add('show');
    launchConfetti();
}

function closeResult() {
    document.getElementById('resultOverlay').classList.remove('show');
}

document.getElementById('resultOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeResult();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeResult();
});

/* ───── History ───── */
function addHistory(char) {
    history.unshift({ name: char.name, cat: currentCat, noli: char.noli });
    if (history.length > 20) history.pop();
    renderHistory();
}

function renderHistory() {
    const sec = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    sec.style.display = 'block';
    list.innerHTML = '';
    history.forEach((h, i) => {
        const div = document.createElement('div');
        div.className = 'hist-item';
        div.innerHTML = `
            <span style="color:var(--muted);font-size:.85rem;min-width:22px;">${i + 1}.</span>
            <span class="font-display font-bold" style="flex:1;">${h.name}</span>
            ${h.noli ? '<span class="noli-tag" style="font-size:.55rem;padding:.1rem .35rem;">NOLI</span>' : ''}
            <span class="badge ${h.cat === 'female' ? 'badge-f' : 'badge-m'}" style="font-size:.65rem;padding:.15rem .5rem;">
                ${h.cat === 'female' ? 'F' : 'M'}
            </span>
        `;
        list.appendChild(div);
    });
}

/* ───── Confetti ───── */
const confCvs = document.getElementById('confettiCvs');
const cCtx = confCvs.getContext('2d');
let confetti = [];
let confAnim = null;

function sizeConfetti() {
    confCvs.width = window.innerWidth * dpr;
    confCvs.height = window.innerHeight * dpr;
    confCvs.style.width = window.innerWidth + 'px';
    confCvs.style.height = window.innerHeight + 'px';
}
sizeConfetti();
window.addEventListener('resize', sizeConfetti);

function launchConfetti() {
    confetti = [];
    const colors = ['#C9A84C','#9B2335','#1A5C5C','#7A5C2E','#F2E4C8','#2D4A6B','#E8637A','#4ECDC4'];
    for (let i = 0; i < 80; i++) {
        confetti.push({
            x: confCvs.width / 2 + (Math.random() - 0.5) * 100 * dpr,
            y: confCvs.height / 2,
            vx: (Math.random() - 0.5) * 14 * dpr,
            vy: -(Math.random() * 12 + 4) * dpr,
            size: (Math.random() * 6 + 3) * dpr,
            color: colors[Math.floor(Math.random() * colors.length)],
            rot: Math.random() * Math.PI * 2,
            rotV: (Math.random() - 0.5) * 0.3,
            life: 1
        });
    }
    if (confAnim) cancelAnimationFrame(confAnim);
    confFrame();
}

function confFrame() {
    cCtx.clearRect(0, 0, confCvs.width, confCvs.height);
    let alive = false;
    confetti.forEach(p => {
        if (p.life <= 0) return;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.25 * dpr;
        p.vx *= 0.99;
        p.rot += p.rotV;
        p.life -= 0.008;
        cCtx.save();
        cCtx.translate(p.x, p.y);
        cCtx.rotate(p.rot);
        cCtx.globalAlpha = Math.max(0, p.life);
        cCtx.fillStyle = p.color;
        cCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        cCtx.restore();
    });
    if (alive) {
        confAnim = requestAnimationFrame(confFrame);
    } else {
        cCtx.clearRect(0, 0, confCvs.width, confCvs.height);
    }
}

/* ───── Background Particles ───── */
const pCvs = document.getElementById('particleCvs');
const pCtx = pCvs.getContext('2d');
let particles = [];

function sizeParticles() {
    pCvs.width = window.innerWidth * dpr;
    pCvs.height = window.innerHeight * dpr;
    pCvs.style.width = window.innerWidth + 'px';
    pCvs.style.height = window.innerHeight + 'px';
}
sizeParticles();
window.addEventListener('resize', sizeParticles);

class Dust {
    constructor() { this.reset(true); }
    reset(init) {
        this.x = Math.random() * pCvs.width;
        this.y = init ? Math.random() * pCvs.height : pCvs.height + 20;
        this.r = (Math.random() * 1.5 + 0.4) * dpr;
        this.vy = -(Math.random() * 0.4 + 0.1) * dpr;
        this.vx = (Math.random() - 0.5) * 0.2 * dpr;
        this.alpha = Math.random() * 0.35 + 0.05;
        this.pulse = Math.random() * Math.PI * 2;
    }
    update() {
        this.y += this.vy;
        this.x += this.vx;
        this.pulse += 0.02;
        if (this.y < -20) this.reset(false);
    }
    draw(ctx) {
        const a = this.alpha * (0.6 + 0.4 * Math.sin(this.pulse));
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.1, this.r), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,168,76,${a.toFixed(3)})`;
        ctx.fill();
    }
}

for (let i = 0; i < 60; i++) particles.push(new Dust());

function particleLoop() {
    pCtx.clearRect(0, 0, pCvs.width, pCvs.height);
    particles.forEach(p => { p.update(); p.draw(pCtx); });
    requestAnimationFrame(particleLoop);
}
particleLoop();

drawWheel();
</script>
